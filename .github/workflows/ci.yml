name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend — Node.js ${{ matrix.node-version }} (NestJS)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["18.x", "20.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & Test (Backend)
        run: |
          if [ -f backend/package.json ]; then
            cd backend
            npm ci --prefer-offline
            npm run lint --if-present
            npm run type-check --if-present
            npm run test --if-present -- --ci --coverage
            npm run build --if-present
          else
            echo "backend/package.json not found — skipping"
          fi

  frontend:
    name: Frontend — Node.js ${{ matrix.node-version }} (Next.js)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["18.x", "20.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build (Frontend)
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci --prefer-offline
            npm run lint --if-present
            npm run type-check --if-present
            npm run test --if-present -- --ci
            npm run build --if-present
          else
            echo "frontend/package.json not found — skipping"
          fi
